<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudocode Viewer - REAA</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔍</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/responsive.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/ui-improvements.css') }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f1116;
            color: #e5e7eb;
        }

        .panel {
            background-color: #1a1d23;
            border-radius: 0.5rem;
        }

        .sidebar {
            background-color: #1a1d23;
        }

        pre {
            background-color: #161b22;
            padding: 1em;
            border-radius: 0.5rem;
            overflow-x: auto;
            overflow-y: auto;
            margin: 0;
            border: 1px solid #30363d;
            max-width: 100%;
            white-space: pre;
        }

        code {
            font-family: 'ui-monospace', 'SFMono-Regular', 'SF Mono', 'Menlo', 'Consolas', 'Liberation Mono', monospace;
        }

        .file-item {
            cursor: pointer;
            transition: all 0.2s;
        }

        .file-item:hover {
            background-color: #374151;
        }

        .file-item.active {
            background-color: #4f46e5;
            border-left: 3px solid #818cf8;
        }

        .diff-line-added {
            background-color: rgba(34, 197, 94, 0.2);
            color: #4ade80;
        }

        .diff-line-removed {
            background-color: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .diff-line-context {
            color: #9ca3af;
        }

        .diff-line-header {
            color: #60a5fa;
            font-weight: bold;
        }

        .code-container {
            height: calc(100vh - 200px);
            overflow: auto;
        }

        #code-content {
            max-height: 100%;
            overflow: auto;
        }
    </style>
</head>

<body class="bg-gray-950 text-gray-100 font-sans antialiased h-screen overflow-hidden">

    <div class="flex h-full">

        <!-- Sidebar -->
        <div class="w-96 bg-gray-900 border-r border-gray-800 flex flex-col shadow-2xl">

            <div class="p-6 border-b border-gray-800">
                <div class="flex items-center gap-3 mb-3">
                    <div
                        class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold text-white">Pseudocode Viewer</h1>
                    </div>
                </div>
            </div>

            <!-- Job Selection -->
            <div class="p-6 border-b border-gray-800">
                <h2 class="text-sm font-semibold text-gray-300 mb-4 flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10">
                        </path>
                    </svg>
                    Select Job
                </h2>
                <select id="job-select"
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-200 focus:outline-none focus:border-indigo-500">
                    <option value="">-- Select a job --</option>
                </select>
            </div>

            <!-- File List -->
            <div id="file-list-section" class="flex-1 flex flex-col p-6 hidden">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-sm font-semibold text-gray-300 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                            </path>
                        </svg>
                        Pseudocode Files
                    </h2>
                    <button id="refresh-files"
                        class="text-xs text-gray-400 hover:text-gray-200 transition p-1 hover:bg-gray-800 rounded">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15">
                            </path>
                        </svg>
                    </button>
                </div>
                <div id="files-list" class="flex-1 overflow-y-auto space-y-2 pr-2 max-h-[calc(100vh-400px)]">
                    <div class="text-center py-8 text-sm text-gray-500">
                        Select a job to view pseudocode files
                    </div>
                </div>
            </div>

            <!-- Back Button -->
            <div class="p-6 border-t border-gray-800">
                <a href="/"
                    class="w-full bg-gray-700 hover:bg-gray-600 text-white font-medium py-2.5 px-4 rounded-lg transition-all duration-200 flex items-center justify-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10 19l-7-7m0 0l7-7m-7 7h18">
                        </path>
                    </svg>
                    <span>Back to Dashboard</span>
                </a>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col bg-gray-900 overflow-visible w-full">

            <!-- Header -->
            <div class="bg-gray-800 border-b border-gray-700 px-6 py-3">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <h2 id="current-file-title" class="text-lg font-semibold text-white flex items-center gap-2">
                            <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                                </path>
                            </svg>
                            Select a file to view
                        </h2>
                    </div>
                    <div class="flex items-center gap-3">
                        <button id="copy-btn" class="hidden text-sm p-1.5 bg-gray-700 hover:bg-gray-600 text-gray-200 rounded-lg transition flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z">
                                </path>
                            </svg>
                            Copy
                        </button>
                    </div>
                </div>
            </div>

            <!-- Code Viewer -->
            <div id="code-container" class="flex-1 overflow-auto p-6">
                <div class="bg-gray-800 rounded-xl border border-gray-700 p-6 min-h-full">
                    <div id="welcome-message" class="flex items-center justify-center min-h-[400px]">
                        <div class="text-center">
                            <svg class="w-16 h-16 mx-auto text-gray-600 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                                </path>
                            </svg>
                            <p class="text-gray-500">Select a job and a pseudocode file to view its contents</p>
                        </div>
                    </div>
                    <div id="code-viewer" class="hidden">
                        <pre class="overflow-auto"><code id="code-content" class="language-c"></code></pre>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="alert-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-gray-800 rounded-lg border border-gray-700 w-full max-w-md p-6">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-10 h-10 bg-yellow-600 rounded-full flex items-center justify-center flex-shrink-0">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
                        </path>
                    </svg>
                </div>
                <h2 class="text-lg font-semibold text-white">Attention Required</h2>
            </div>
            <p id="alert-message" class="text-gray-300 mb-6"></p>
            <div class="flex justify-end">
                <button id="close-alert" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm transition">
                    OK
                </button>
            </div>
        </div>
    </div>

    <div id="diff-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-gray-800 rounded-lg border border-gray-700 w-full max-w-6xl max-h-[90vh] p-6 flex flex-col">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-green-600 rounded-lg flex items-center justify-center">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                            </path>
                        </svg>
                    </div>
                    <div>
                        <h2 class="text-lg font-semibold text-white">Code Diff</h2>
                        <p id="diff-filename" class="text-xs text-gray-400"></p>
                    </div>
                </div>
                <button id="close-diff" class="text-gray-400 hover:text-white transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                        </path>
                    </svg>
                </button>
            </div>
            <div id="diff-content" class="flex-1 overflow-auto bg-gray-900 rounded-lg p-4 font-mono text-sm">
                <pre id="diff-output" class="text-gray-300 whitespace-pre-wrap"></pre>
            </div>
        </div>
    </div>

    <script>
        let currentJobId = null;
        let currentFile = null;

        function getAuthHeaders() {
            const token = localStorage.getItem('token');
            return token ? { 'Authorization': `Bearer ${token}` } : {};
        }

        
        document.addEventListener('DOMContentLoaded', function() {
            loadJobs();
            
           
            const urlParams = new URLSearchParams(window.location.search);
            const jobId = urlParams.get('job_id');
            if (jobId) {
                document.getElementById('job-select').value = jobId;
                loadPseudocodeFiles(jobId);
            }
        });

       
        async function loadJobs() {
            try {
                const response = await fetch('/api/jobs', { headers: getAuthHeaders() });
                const data = await response.json();
                
                const select = document.getElementById('job-select');
                select.innerHTML = '<option value="">-- Select a job --</option>';
                
                if (data.jobs && data.jobs.length > 0) {
                    data.jobs.forEach(job => {
                        const option = document.createElement('option');
                        option.value = job.id;
                        option.textContent = `${job.filename} (${job.id.substring(0, 8)}...)`;
                        select.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('Failed to load jobs:', error);
            }
        }

       
        document.getElementById('job-select').addEventListener('change', function() {
            currentJobId = this.value;
            if (currentJobId) {
                document.getElementById('file-list-section').classList.remove('hidden');
                loadPseudocodeFiles(currentJobId);
            } else {
                document.getElementById('file-list-section').classList.add('hidden');
            }
        });


        async function loadPseudocodeFiles(jobId) {
            try {
                const response = await fetch(`/api/jobs/${jobId}/pseudocode/files`, { headers: getAuthHeaders() });
                const data = await response.json();
                
                const filesList = document.getElementById('files-list');
                
                if (data.files && data.files.length > 0) {
                    filesList.innerHTML = '';
                    data.files.forEach(file => {
                        const hasRefined = data.refined_files && data.refined_files.includes(file);
                        const div = document.createElement('div');
                        div.className = 'file-item p-3 rounded-lg border border-gray-700 bg-gray-800';
                        div.innerHTML = `
                            <div class="flex items-center justify-between gap-2">
                                <div class="flex items-center gap-2 cursor-pointer flex-1" onclick="loadPseudocodeContent('${jobId}', '${file}', this.parentElement.parentElement)">
                                    <svg class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                                        </path>
                                    </svg>
                                    <span class="text-sm text-gray-200">${file}</span>
                                </div>
                                ${hasRefined ? `
                                    <button onclick="showDiff('${jobId}', '${file}')" class="text-xs bg-green-600 hover:bg-green-700 text-white px-2 py-1 rounded transition flex items-center gap-1">
                                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                                            </path>
                                        </svg>
                                        Diff
                                    </button>
                                ` : ''}
                            </div>
                        `;
                        filesList.appendChild(div);
                    });
                } else {
                    filesList.innerHTML = `
                        <div class="text-center py-8 text-sm text-gray-500">
                            No pseudocode files found for this job
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Failed to load pseudocode files:', error);
                document.getElementById('files-list').innerHTML = `
                    <div class="text-center py-8 text-sm text-red-500">
                        Failed to load pseudocode files
                    </div>
                `;
            }
        }

       
        async function loadPseudocodeContent(jobId, filename, element) {
            try {
               
                document.querySelectorAll('.file-item').forEach(item => item.classList.remove('active'));
                element.classList.add('active');
                
                const response = await fetch(`/api/jobs/${jobId}/pseudocode/${filename}`, { headers: getAuthHeaders() });
                const data = await response.json();
                
                if (data.error) {
                    document.getElementById('alert-message').textContent = data.error;
                    document.getElementById('alert-modal').classList.remove('hidden');
                    return;
                }
                
                currentFile = filename;
                
             
                document.getElementById('current-file-title').innerHTML = `
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                        </path>
                    </svg>
                    ${filename}
                `;
                
             
                document.getElementById('welcome-message').classList.add('hidden');
                document.getElementById('code-viewer').classList.remove('hidden');
                document.getElementById('copy-btn').classList.remove('hidden');
                
               
                const codeContent = document.getElementById('code-content');
                codeContent.textContent = data.content;
                hljs.highlightElement(codeContent);
                
            } catch (error) {
                console.error('Failed to load pseudocode content:', error);
                document.getElementById('alert-message').textContent = 'Failed to load pseudocode content';
                document.getElementById('alert-modal').classList.remove('hidden');
            }
        }

       
        document.getElementById('refresh-files').addEventListener('click', function() {
            if (currentJobId) {
                loadPseudocodeFiles(currentJobId);
            }
        });

        document.getElementById('close-alert').addEventListener('click', function() {
            document.getElementById('alert-modal').classList.add('hidden');
        });

        document.getElementById('close-diff').addEventListener('click', function() {
            document.getElementById('diff-modal').classList.add('hidden');
        });

        async function showDiff(jobId, filename) {
            try {
                const response = await fetch(`/api/jobs/${jobId}/diff/${filename}`, { headers: getAuthHeaders() });
                const data = await response.json();
                
                if (data.error) {
                    document.getElementById('alert-message').textContent = data.error;
                    document.getElementById('alert-modal').classList.remove('hidden');
                    return;
                }
                
                document.getElementById('diff-filename').textContent = `Comparing: ${filename}`;
                
                if (data.has_changes) {
                    const lines = data.diff.split('\n');
                    const formattedDiff = lines.map(line => {
                        if (line.startsWith('+')) {
                            return `<div class="diff-line-added">${escapeHtml(line)}</div>`;
                        } else if (line.startsWith('-')) {
                            return `<div class="diff-line-removed">${escapeHtml(line)}</div>`;
                        } else if (line.startsWith('@@') || line.startsWith('---') || line.startsWith('+++')) {
                            return `<div class="diff-line-header">${escapeHtml(line)}</div>`;
                        } else {
                            return `<div class="diff-line-context">${escapeHtml(line)}</div>`;
                        }
                    }).join('');
                    document.getElementById('diff-output').innerHTML = formattedDiff;
                } else {
                    document.getElementById('diff-output').textContent = 'No differences found between pseudocode and refined versions.';
                }
                
                document.getElementById('diff-modal').classList.remove('hidden');
            } catch (error) {
                console.error('Failed to load diff:', error);
                document.getElementById('alert-message').textContent = 'Failed to load diff';
                document.getElementById('alert-modal').classList.remove('hidden');
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

       
        document.getElementById('copy-btn').addEventListener('click', function() {
            const codeContent = document.getElementById('code-content').textContent;
            navigator.clipboard.writeText(codeContent).then(() => {
                const originalText = this.innerHTML;
                this.innerHTML = `
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M5 13l4 4L19 7">
                        </path>
                    </svg>
                    Copied!
                `;
                setTimeout(() => {
                    this.innerHTML = originalText;
                }, 2000);
            });
        });
    </script>
</body>
</html>
