<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - REAA</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <script src="{{ url_for('static', filename='css/libs/tailwind.js') }}"></script>
    <script src="{{ url_for('static', filename='js/libs/jquery.min.js') }}"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/libs/atom-one-dark.min.css') }}">
    <style>
        body {
            background: linear-gradient(135deg, #1e1b4b 0%, #0f172a 100%);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">
    <div class="bg-gray-900 border border-gray-700 rounded-xl p-8 max-w-md w-full mx-4 shadow-2xl">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-white mb-2">REAA</h1>
            <p class="text-gray-400">Reverse Engineering Analysis Assistant</p>
        </div>

        <div id="auth-container">
            <div id="login-form">
                <h2 class="text-xl font-semibold text-white mb-6">Login</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-gray-300 mb-2">Username</label>
                        <input type="text" id="login-username" 
                            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-sm text-gray-200 focus:outline-none focus:border-indigo-500 transition"
                            placeholder="Enter username">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-300 mb-2">Password</label>
                        <input type="password" id="login-password" 
                            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-sm text-gray-200 focus:outline-none focus:border-indigo-500 transition"
                            placeholder="Enter password">
                    </div>
                    <button id="login-submit-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 px-4 rounded-lg transition">
                        Login
                    </button>
                    <div class="text-center text-sm text-gray-400">
                        Don't have an account? <a href="#" id="show-register-link" class="text-indigo-400 hover:text-indigo-300">Register</a>
                    </div>
                </div>
            </div>

            <div id="register-form" class="hidden">
                <h2 class="text-xl font-semibold text-white mb-6">Register</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-gray-300 mb-2">Username</label>
                        <input type="text" id="register-username" 
                            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-sm text-gray-200 focus:outline-none focus:border-indigo-500 transition"
                            placeholder="Enter username">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-300 mb-2">Password</label>
                        <input type="password" id="register-password" 
                            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-sm text-gray-200 focus:outline-none focus:border-indigo-500 transition"
                            placeholder="Enter password">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-300 mb-2">Confirm Password</label>
                        <input type="password" id="register-confirm-password" 
                            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-sm text-gray-200 focus:outline-none focus:border-indigo-500 transition"
                            placeholder="Confirm password">
                    </div>
                    <button id="register-submit-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 px-4 rounded-lg transition">
                        Register
                    </button>
                    <div class="text-center text-sm text-gray-400">
                        Already have an account? <a href="#" id="show-login-link" class="text-indigo-400 hover:text-indigo-300">Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <script>
        function showToast(message, type = 'info') {
            const toast = $(`
                <div class="px-4 py-3 rounded-lg shadow-lg flex items-center gap-2 animate-slide-in ${
                    type === 'success' ? 'bg-green-600' :
                    type === 'error' ? 'bg-red-600' :
                    type === 'warning' ? 'bg-yellow-600' :
                    'bg-blue-600'
                } text-white">
                    ${message}
                </div>
            `);
            
            $('#toast-container').append(toast);
            
            setTimeout(() => {
                toast.fadeOut(300, () => toast.remove());
            }, 3000);
        }

        $(document).ready(function() {
       
            $('#show-register-link').on('click', function(e) {
                e.preventDefault();
                $('#login-form').addClass('hidden');
                $('#register-form').removeClass('hidden');
            });

            $('#show-login-link').on('click', function(e) {
                e.preventDefault();
                $('#register-form').addClass('hidden');
                $('#login-form').removeClass('hidden');
            });

        
            $('#login-submit-btn').on('click', function() {
                const username = $('#login-username').val();
                const password = $('#login-password').val();
                
                if (!username || !password) {
                    showToast('Please enter username and password', 'warning');
                    return;
                }

                $.ajax({
                    url: '/api/auth/login',
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ username, password }),
                    success: function (data) {
                        localStorage.setItem('token', data.token);
                        showToast('Login successful! Redirecting...', 'success');
                        setTimeout(() => {
                            window.location.href = '/';
                        }, 1000);
                    },
                    error: function (xhr) {
                        showToast('Login failed: ' + (xhr.responseJSON?.error || 'Unknown error'), 'error');
                    }
                });
            });

       
            $('#register-submit-btn').on('click', function() {
                const username = $('#register-username').val();
                const password = $('#register-password').val();
                const confirmPassword = $('#register-confirm-password').val();
                
                if (!username || !password) {
                    showToast('Please enter username and password', 'warning');
                    return;
                }

                if (password !== confirmPassword) {
                    showToast('Passwords do not match', 'error');
                    return;
                }

                $.ajax({
                    url: '/api/auth/register',
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ username, password }),
                    success: function (data) {
                        showToast('Registration successful! Please login.', 'success');
                        $('#register-form').addClass('hidden');
                        $('#login-form').removeClass('hidden');
                        $('#register-username').val('');
                        $('#register-password').val('');
                        $('#register-confirm-password').val('');
                    },
                    error: function (xhr) {
                        showToast('Registration failed: ' + (xhr.responseJSON?.error || 'Unknown error'), 'error');
                    }
                });
            });
        });
    </script>
</body>
</html>
