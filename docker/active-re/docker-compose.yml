version: '3.8'

services:
  active-re-sandbox:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reaa-active-re
    networks:
      - isolated
    volumes:
      - ./frida_scripts:/app/frida_scripts:ro
      - ../data:/app/data:rw
      - ./artifacts:/app/artifacts:rw
    environment:
      - FRIDA_SCRIPTS_DIR=/app/frida_scripts
      - PYTHONUNBUFFERED=1
    mem_limit: 2g
    cpus: 2.0
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    restart: unless-stopped

networks:
  isolated:
    driver: bridge
    internal: true
